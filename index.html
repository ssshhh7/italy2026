<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Italy 2026 Trip</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --j-green: #6B8E23; --j-red: #D9534F; --j-bg: #F9F9F7; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--j-bg); -webkit-tap-highlight-color: transparent; }
        .banner-mask { height: 250px; width: 100%; overflow: hidden; position: relative; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; object-position: center; }
        .main-container { margin-top: -40px; border-radius: 40px 40px 0 0; background-color: var(--j-bg); position: relative; z-index: 20; min-height: 800px; }
        .tab-btn { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(5px); }
        .tab-active { background-color: var(--j-green) !important; color: white !important; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .date-card-active { background-color: var(--j-green); color: white; transform: scale(1.05); box-shadow: 0 4px 10px rgba(107,142,35,0.3); }
        [v-cloak] { display: none; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="max-w-md mx-auto min-h-screen relative shadow-xl bg-white">
        
        <!-- Header Banner -->
        <header class="relative">
            <div class="banner-mask">
                <img src="banner.jpg" class="banner-img" alt="Banner">
            </div>
            <!-- Floating Tabs -->
            <div class="absolute bottom-12 right-4 flex space-x-2 z-30">
                <button v-for="t in tabs" @click="currentTab = t.id" :class="currentTab === t.id ? 'tab-active' : ''" class="tab-btn w-10 h-10 rounded-full flex items-center justify-center text-gray-500 shadow-lg transition-all">
                    <i :class="t.icon"></i>
                </button>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-container p-5">
            
            <div v-if="currentTab === 'itinerary'">
                <!-- Date Selector -->
                <div class="sticky top-0 z-50 bg-[#F9FAFB] flex overflow-x-auto hide-scrollbar space-x-3 mb-6 py-4 px-6 -mx-6">
                    <div v-for="d in dates" :key="d.full" @click="selectedDate = d.full"
                        :class="selectedDate === d.full ? 'date-card-active' : 'bg-white text-gray-400'"
                        class="flex-shrink-0 w-14 h-20 rounded-2xl flex flex-col items-center justify-center transition-all cursor-pointer shadow-sm border border-gray-50">
                        <span class="text-[10px] font-bold uppercase mb-1">{{d.day}}</span>
                        <span class="text-xl font-bold">{{d.date}}</span>
                    </div>
                </div>

                <!-- City & Weather Header -->
                <div class="bg-white p-4 rounded-2xl mb-6 shadow-sm border border-gray-50 flex justify-between items-center">
                    <div class="flex items-center">
                        <!-- 左側：地點圖示與純地點名稱 -->
                        <i class="fas fa-map-marker-alt text-red-500 text-2xl mr-3"></i>
                        <div>
                            <!-- 只顯示地點，不再顯示日期與 Current Destination -->
                            <div class="text-lg font-bold text-gray-800 leading-tight">{{currentCity}}</div>
                        </div>
                    </div>
                    <!-- 右側：天氣圖示與氣溫 -->
                    <div class="text-right flex flex-col items-end">
                        <i :class="currentWeather.icon" class="text-yellow-500 text-xl mb-1"></i>
                        <div class="text-[11px] text-gray-500 font-bold">{{currentWeather.temp}}</div>
                    </div>
                </div>

                <!-- List -->
                <div class="space-y-5">
                    <div v-for="(item, idx) in filteredItinerary" :key="idx" @click="toggleMenu(idx)" class="relative group cursor-pointer">
                        
                        <!-- 統一按鈕組：放在卡片的最上方 -->
                        <div class="absolute top-2 right-2 flex space-x-2 z-[60]">
                            <!-- 電腦版 Hover -->
                            <div class="hidden md:flex space-x-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button @click.stop="editItem(item)" class="bg-blue-500 text-white w-8 h-8 rounded-full shadow-lg flex items-center justify-center">
                                    <i class="fas fa-edit text-xs"></i>
                                </button>
                                <button @click.stop="deleteItem(item)" class="bg-red-500 text-white w-8 h-8 rounded-full shadow-lg flex items-center justify-center">
                                    <i class="fas fa-trash-alt text-xs"></i>
                                </button>
                            </div>

                            <!-- 手機版 Click (由 activeItemId 控制) -->
                            <div v-if="activeItemId === idx" class="flex md:hidden space-x-2 animate-in fade-in zoom-in duration-200">
                                <button @click.stop="editItem(item)" class="bg-blue-500 text-white w-8 h-8 rounded-full shadow-lg flex items-center justify-center">
                                    <i class="fas fa-edit text-xs"></i>
                                </button>
                                <button @click.stop="deleteItem(item)" class="bg-red-500 text-white w-8 h-8 rounded-full shadow-lg flex items-center justify-center">
                                    <i class="fas fa-trash-alt text-xs"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Flight Card -->
                        <div v-if="item.type === '航班'" class="bg-gray-800 text-white p-5 rounded-3xl shadow-md">
                            <!-- 內容維持不變 -->
                            <div class="flex justify-between text-[10px] mb-4 opacity-70">
                                <span>{{item.note}}</span>
                                <i class="fas fa-plane"></i>
                            </div>
                            <div class="flex justify-between items-center text-center">
                                <div><div class="text-xl font-bold">{{item.from}}</div><div class="text-xs opacity-60">{{item.time}}</div></div>
                                <div class="flex-1 border-t border-dashed border-gray-500 mx-4"></div>
                                <div><div class="text-xl font-bold">{{item.to}}</div><div class="text-xs opacity-60">{{item.arrTime}}</div></div>
                            </div>
                        </div>

                        <!-- Normal Card -->
                        <div v-else class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-japan-green flex items-start space-x-3">
                            <div class="bg-gray-50 p-2 rounded-xl text-japan-green">
                                <i :class="getIcon(item.type)"></i>
                            </div>
                            <div class="flex-1">
                                <div class="flex justify-between items-center">
                                    <span class="text-[10px] font-bold text-japan-green">{{item.type}}</span>
                                    <span class="text-[10px] text-gray-400">{{item.time}}</span>
                                </div>
                                <h3 class="font-bold text-gray-800 text-sm mb-1">{{item.title}}</h3>
                                <p class="text-[11px] text-gray-500 leading-relaxed">{{item.note}}</p>
                                <!-- 地圖按鈕放在內容區下方，並加上 .stop 防止觸發選單關閉 -->
                                <div v-if="item.type === '景點' || item.type === '美食'" 
                                    @click.stop="goMap(item.title)" 
                                    class="mt-2 text-[10px] text-blue-500 inline-block">
                                    <i class="fas fa-map-marker-alt"></i> Google Maps
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Placeholder for other tabs -->
            <div v-if="currentTab !== 'itinerary'" class="py-20 text-center text-gray-300">
                <i class="fas fa-hammer text-4xl mb-4"></i>
                <p>功能開發中...</p>
            </div>
        </main>

        <!-- Floating Action Button -->
        <button @click="openModal" class="fixed bottom-6 right-6 w-14 h-14 bg-[#D9534F] text-white rounded-full shadow-xl flex items-center justify-center text-xl z-50 hover:scale-110 transition-transform">
            <i class="fas fa-plus"></i>
        </button>

        <!-- 新增行程彈窗 -->
        <div v-if="showAddModal" @click.self="showAddModal = false" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-6">
            <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
                <h2 class="text-xl font-bold mb-4 text-gray-800">新增 {{selectedDate}} 行程</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">類別</label>
                        <select v-model="newItem.type" class="w-full bg-gray-50 border-none rounded-xl px-4 py-3 text-gray-700 h-[52px] appearance-none cursor-pointer shadow-none outline-none" style="font-size: 16px; -webkit-appearance: none; -webkit-tap-highlight-color: transparent;">
                            <option>景點</option>
                            <option>美食</option>
                            <option>住宿</option>
                            <option>交通</option>
                            <option>其他</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 block mb-1">名稱</label>
                        <input v-model="newItem.title" type="text" placeholder="例如：萬神殿" class="w-full bg-gray-50 border-none rounded-xl p-3 text-sm">
                    </div>
                    <div class="flex space-x-3">
                        <div class="flex-1">
                            <label class="text-xs text-gray-400 block mb-1">時間</label>
                            <input v-model="newItem.time" type="text" placeholder="14:00" class="w-full bg-gray-50 border-none rounded-xl p-3 text-sm">
                        </div>
                        <div class="flex-1">
                            <label class="text-xs text-gray-400 block mb-1">備註</label>
                            <input v-model="newItem.note" type="text" placeholder="記得預約" class="w-full bg-gray-50 border-none rounded-xl p-3 text-sm">
                        </div>
                    </div>
                </div>

                <div class="flex space-x-3 mt-6">
                    <button @click="showAddModal = false" class="flex-1 py-3 rounded-xl text-gray-500 font-bold text-sm bg-gray-100">取消</button>
                    <button @click="addItem" class="flex-1 py-3 rounded-xl text-white font-bold text-sm bg-red-500">儲存</button>
                </div>
            </div>
        </div>
    </div>

                    { date: '5/6', type: '景點', title: '聖馬可廣場', time: '14:30', note: '威尼斯地標，後方有【奎利尼·斯坦帕里亞基金會】可休息/如廁' },
                    { date: '5/6', type: '景點', title: '嘆息橋', time: '15:15', note: '連接總督宮與監獄的華麗橋樑，在麥草橋上拍攝最美' },,
                    { date: '5/6', type: '美食', title: 'Caffè Florian', time: '15:30', note: '花神咖啡館：世界最美咖啡館之一，體驗廣場露天音樂' },
                    { date: '5/6', type: '美食', title: 'Gelatoteca Suso', time: '17:00', note: '人氣冰淇淋，買完剛好去旁邊的橋拍照' },
                    { date: '5/6', type: '景點', title: '里阿爾托橋', time: '17:30', note: '威尼斯最著名的橋樑，欣賞大運河日落黃金時刻' },
                    { date: '5/6', type: '住宿', title: 'Casanova ai Tolentini', time: '14:00', note: '威尼斯住宿 (1 night)' },
                    
                    // 5/7 Thu.
                    { date: '5/7', type: '其他', title: '威尼斯-米蘭 火車', time: '09:00', note: 'Venezia - Milano', gap: '2.5 hrs' },
                    { date: '5/7', type: '景點', title: '米蘭主教座堂 (Duomo)', time: '15:30', note: '世界第三大教堂，必看哥德式尖塔與石雕 (需事先預約登頂)，附近百貨Rinascente Milano的7F有廁所' },
                    { date: '5/7', type: '景點', title: '最後的晚餐', time: '15:00', note: '達文西名畫參觀' },
                    { date: '5/7', type: '購物', title: 'Pettinaroli', time: '14:30', note: '百年文具老店，精美手工筆記本、印章與傳統書寫工具' },
                    { date: '5/7', type: '美食', title: 'Ciacco Gelato', time: '14:00', note: '評分極高的手工冰淇淋，專注食材天然原味' },
                    { date: '5/7', type: '住宿', title: 'Binario Verticale', time: '18:00', note: '米蘭住宿 (1 night)' },
                    
                    // 5/8 Fri.
                    { date: '5/8', type: '航班', title: '長榮航空 BR 96', from: 'MXP', to: 'TPE', time: '11:15', arrTime: '05:55(+1)', note: '米蘭馬爾彭薩 - 桃園機場' }
                ]);

                
                const activeItemId = ref(null);

                const toggleMenu = (idx) => {
                // 加上這行 console.log，你可以按 F12 檢查點擊是否有反應
                console.log('點擊了：', idx); 
                activeItemId.value = activeItemId.value === idx ? null : idx;
                };

                const editItem = (item) => {
                const newTitle = prompt("修改行程名稱：", item.title);
                if (newTitle) {
                    item.title = newTitle;
                    // ... 其他修改邏輯
                }
                activeItemId.value = null; // 執行完動作後，把按鈕藏起來
                };

                const deleteItem = (targetItem) => {
                if (confirm(`確定要刪除嗎？`)) {
                    itinerary.value = itinerary.value.filter(item => item !== targetItem);
                }
                activeItemId.value = null; // 執行完動作後，把按鈕藏起來
                };

                const filteredItinerary = computed(() => {
                    return itinerary.value.filter(i => i.date === selectedDate.value);
                });

                const currentCity = computed(() => {
                    const found = dates.find(d => d.full === selectedDate.value);
                    return found ? found.loc : '行程規劃';
                });

                const currentWeather = computed(() => {
                    const found = dates.find(d => d.full === selectedDate.value);
                    return found ? { temp: found.temp, icon: found.icon } : { temp: '--°C', icon: 'fas fa-question' };
                });

                const getIcon = (type) => {
                    const map = { '景點': 'fas fa-map-marked-alt', '住宿': 'fas fa-bed', '美食': 'fas fa-utensils', '其他': 'fas fa-exchange-alt' };
                    return map[type] || 'fas fa-info-circle';
                };

                const goMap = (q) => window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`, '_blank');

                // 打開彈窗
                const openModal = () => {
                    showAddModal.value = true;
                };

                // 儲存新行程
                const addItem = () => {
                    if (!newItem.value.title) {
                        alert('請輸入行程名稱！');
                        return;
                    }
                    // 將新行程加入到清單中（會自動對應目前選中的日期）
                    itinerary.value.push({
                        ...newItem.value,
                        date: selectedDate.value
                    });
                    
                    // 重置輸入框並關閉彈窗
                    newItem.value = { type: '景點', title: '', time: '', note: '', gap: '' };
                    showAddModal.value = false;
                };

                return { currentTab, tabs, dates, selectedDate, filteredItinerary, currentCity, currentWeather, getIcon, goMap, showAddModal, newItem, openModal, addItem,activeItemId, toggleMenu, editItem, deleteItem };
                
            }
        }).mount('#app');
    </script>
</body>
</html>
